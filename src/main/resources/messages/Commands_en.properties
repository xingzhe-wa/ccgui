# CCGui Commands Bundle (English)
# Default language: Chinese (Commands.properties)

# === Session Commands ===
command.session.new=New Session
command.session.new.description=Create a new chat session
command.session.new.longDescription=Creates a new chat session with optional type (auto/thinking/planning)

command.session.switch=Switch Session
