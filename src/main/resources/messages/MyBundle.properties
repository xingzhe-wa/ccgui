# === 默认 Agents ===
agent.code.generator.name=代码生成器
agent.code.generator.description=根据需求生成高质量代码
agent.code.generator.prompt=你是一个专业的代码生成助手。根据用户需求生成清晰、高效、可维护的代码。
agent.refactor.expert.name=重构专家
agent.refactor.expert.description=重构代码以提升质量和可维护性
agent.refactor.expert.prompt=你是一个代码重构专家。分析代码并提供重构建议，重点关注代码质量、性能和可维护性。
agent.test.engineer.name=测试工程师
agent.test.engineer.description=为代码生成完整的单元测试
agent.test.engineer.prompt=你是一个测试工程师。为代码生成完整的单元测试，覆盖主要场景和边界情况。
agent.doc.assistant.name=文档助手
agent.doc.assistant.description=为代码生成清晰的文档
agent.doc.assistant.prompt=你是一个文档助手。为代码生成清晰、完整的文档，包括功能说明、参数说明和使用示例。
agent.debug.expert.name=调试专家
agent.debug.expert.description=诊断和修复代码中的问题
agent.debug.expert.prompt=你是一个调试专家。分析代码中的问题，提供诊断和修复建议。
agent.general.assistant.name=全能助手
agent.general.assistant.description=具备多种能力的综合助手
agent.general.assistant.prompt=你是一个全能的代码助手，可以帮助完成各种编程任务。

# === 默认 Skills ===
skill.code.generator.name=代码生成器
skill.code.generator.description=根据描述生成代码
skill.code.generator.prompt=请根据以下描述生成代码：\n\n{description}\n\n要求：\n1. 代码风格一致\n2. 包含必要注释\n3. 考虑边界情况
skill.code.reviewer.name=代码审查员
skill.code.reviewer.description=审查代码并提供改进建议
skill.code.reviewer.prompt=请审查以下代码，并提供改进建议：\n\n{code}\n\n重点关注：\n1. 代码质量\n2. 潜在bug\n3. 性能优化\n4. 安全问题
skill.test.generator.name=单元测试生成
skill.test.generator.description=为代码生成单元测试
skill.test.generator.prompt=请为以下代码生成完整的单元测试：\n\n{code}\n\n测试框架：{framework}\n\n要求覆盖主要场景。
skill.refactor.name=代码重构
skill.refactor.description=重构代码以提升质量
skill.refactor.prompt=请重构以下代码以提升质量和可读性：\n\n{code}\n\n保持原有功能不变。
skill.doc.generator.name=文档生成
skill.doc.generator.description=为代码生成文档
skill.doc.generator.prompt=请为以下代码生成清晰的文档：\n\n{code}\n\n包括：\n1. 功能说明\n2. 参数说明\n3. 返回值说明\n4. 使用示例
skill.debug.name=问题分析
skill.debug.description=分析代码中的问题
skill.debug.prompt=请分析以下代码中的问题：\n\n{code}\n\n问题描述：{problem}\n\n提供诊断和修复建议。

