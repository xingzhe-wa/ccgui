# === 对话模式 ===
mode.auto.display.name=自动模式
mode.auto.description=快速响应，直接执行。适合简单问答、代码补全、快速修复等轻量任务。Claude Code 会立即执行命令，无需额外确认。
mode.thinking.display.name=思考模式
mode.thinking.description=深度思考，逐步推理。适合复杂问题分析、架构设计、代码审查等需要深入思考的任务。Claude 会先展示思考过程再给出最终答案。
mode.planning.display.name=规划模式
mode.planning.description=先规划后执行，适合大型任务分解。适合复杂的多步骤任务，如重构大型模块、编写完整功能、批量修改等。Claude 会先制定执行计划，经确认后再逐步执行。

