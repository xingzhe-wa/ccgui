# === Conversation Modes ===
mode.auto.display.name=Auto Mode
mode.auto.description=Quick response, direct execution. Suitable for simple Q&A, code completion, quick fixes, and other lightweight tasks. Claude Code will execute commands immediately without additional confirmation.
mode.thinking.display.name=Thinking Mode
mode.thinking.description=Deep thinking, step-by-step reasoning. Suitable for complex problem analysis, architecture design, code review, and other tasks requiring deep thought. Claude will show the thinking process before providing the final answer.
mode.planning.display.name=Planning Mode
mode.planning.description=Plan first, execute later, suitable for breaking down large tasks. Ideal for complex multi-step tasks like refactoring large modules, writing complete features, batch modifications, etc. Claude will create an execution plan first, then execute it step by step after confirmation.

