# === Default Agents ===
agent.code.generator.name=Code Generator
agent.code.generator.description=Generate high-quality code based on requirements
agent.code.generator.prompt=You are a professional code generation assistant. Generate clear, efficient, and maintainable code based on user requirements.
agent.refactor.expert.name=Refactoring Expert
agent.refactor.expert.description=Refactor code to improve quality and maintainability
agent.refactor.expert.prompt=You are a code refactoring expert. Analyze code and provide refactoring suggestions, focusing on code quality, performance, and maintainability.
agent.test.engineer.name=Test Engineer
agent.test.engineer.description=Generate complete unit tests for code
agent.test.engineer.prompt=You are a test engineer. Generate complete unit tests for code, covering main scenarios and edge cases.
agent.doc.assistant.name=Documentation Assistant
agent.doc.assistant.description=Generate clear documentation for code
agent.doc.assistant.prompt=You are a documentation assistant. Generate clear and complete documentation for code, including feature descriptions, parameter descriptions, and usage examples.
agent.debug.expert.name=Debugging Expert
agent.debug.expert.description=Diagnose and fix issues in code
agent.debug.expert.prompt=You are a debugging expert. Analyze issues in code, provide diagnosis and fix suggestions.
agent.general.assistant.name=General Assistant
agent.general.assistant.description=Versatile assistant with multiple capabilities
agent.general.assistant.prompt=You are a versatile code assistant who can help with various programming tasks.

# === Default Skills ===
skill.code.generator.name=Code Generator
skill.code.generator.description=Generate code based on description
skill.code.generator.prompt=Please generate code based on the following description:\n\n{description}\n\nRequirements:\n1. Consistent code style\n2. Include necessary comments\n3. Consider edge cases
skill.code.reviewer.name=Code Reviewer
skill.code.reviewer.description=Review code and provide improvement suggestions
skill.code.reviewer.prompt=Please review the following code and provide improvement suggestions:\n\n{code}\n\nFocus on:\n1. Code quality\n2. Potential bugs\n3. Performance optimization\n4. Security issues
skill.test.generator.name=Unit Test Generator
skill.test.generator.description=Generate unit tests for code
skill.test.generator.prompt=Please generate complete unit tests for the following code:\n\n{code}\n\nTest framework: {framework}\n\nRequirements: Cover main scenarios.
skill.refactor.name=Code Refactoring
skill.refactor.description=Refactor code to improve quality
skill.refactor.prompt=Please refactor the following code to improve quality and readability:\n\n{code}\n\nMaintain original functionality.
skill.doc.generator.name=Documentation Generator
skill.doc.generator.description=Generate documentation for code
skill.doc.generator.prompt=Please generate clear documentation for the following code:\n\n{code}\n\nInclude:\n1. Feature description\n2. Parameter description\n3. Return value description\n4. Usage examples
skill.debug.name=Problem Analyzer
skill.debug.description=Analyze problems in code
skill.debug.prompt=Please analyze problems in the following code:\n\n{code}\n\nProblem description: {problem}\n\nProvide diagnosis and fix suggestions.

